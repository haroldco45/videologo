<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Viral AI | Vibras Positivas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .loader {
            border: 3px solid rgba(168, 85, 247, 0.2);
            border-top: 3px solid #a855f7;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-gradient {
            background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col items-center justify-center p-4 text-center">

    <header class="mb-8">
        <div class="inline-block p-2 px-4 rounded-full bg-purple-500/10 border border-purple-500/20 mb-4">
            <span class="text-purple-400 text-xs font-bold tracking-widest uppercase">Inteligencia Artificial Real</span>
        </div>
        <h1 class="text-4xl font-extrabold text-white mb-2">Logo Viral <span class="text-purple-500 text-pink-500">AI</span></h1>
        <p class="text-slate-400">Transforma tu marca con la energía de Vibras Positivas</p>
    </header>

    <main class="glass-card p-8 rounded-3xl w-full max-w-lg shadow-2xl">
        
        <div class="space-y-4 mb-6 text-left">
            <label class="block text-sm font-medium text-slate-300">1. URL del Logo (Pública)</label>
            <div class="relative">
                <input type="text" id="logo-url" placeholder="https://ejemplo.com/logo.png" 
                class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 outline-none focus:ring-2 focus:ring-purple-500 text-sm">
                <button id="btn-demo" class="absolute right-3 top-3 text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded-lg">Demo</button>
            </div>
        </div>

        <div class="space-y-4 mb-8 text-left">
            <label class="block text-sm font-medium text-slate-300">2. Elige el efecto visual</label>
            <select id="style-select" class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 outline-none focus:ring-2 focus:ring-purple-500 text-sm">
                <option value="Cinematic 3D gold reveal, luxury lighting, 4k">Revelación 3D Oro</option>
                <option value="Futuristic neon glitch, cyber motion, high energy">Energía Neon</option>
                <option value="Explosion of vibrant colors, energetic motion, dynamic">Explosión Épica</option>
            </select>
        </div>

        <button id="generate-btn" class="btn-gradient w-full py-5 rounded-2xl text-white font-bold text-lg flex items-center justify-center gap-3 shadow-lg">
            <i class="fas fa-bolt"></i><span>CREAR VIDEO AHORA</span>
        </button>

        <div id="status-box" class="hidden mt-8 p-6 bg-slate-900 rounded-2xl border border-purple-500/20">
            <div class="flex items-start gap-4 text-left">
                <div class="loader mt-1"></div>
                <div>
                    <p id="status-msg" class="text-sm font-semibold text-purple-300">Contactando IA...</p>
                    <p id="timer" class="text-[10px] text-slate-500 mt-2 uppercase">Procesando fotogramas (aprox 60s)</p>
                </div>
            </div>
        </div>

        <div id="result-box" class="hidden mt-8">
            <video id="video-player" controls class="w-full rounded-2xl border-2 border-purple-500/50 shadow-2xl bg-black"></video>
            <a id="download-btn" href="#" target="_blank" class="block text-center mt-6 bg-white text-black font-bold py-4 rounded-2xl hover:bg-slate-200">
                📥 DESCARGAR VIDEO
            </a>
        </div>
    </main>

    <footer class="mt-12">
        <p class="text-slate-400 text-sm font-semibold italic">Desarrollado por <span class="text-white">Vibras Positivas</span></p>
        <p class="text-slate-600 text-[10px] mt-2 tracking-widest uppercase">© 2026 DERECHOS RESERVADOS</p>
    </footer>

    <script>
        const REPLICATE_TOKEN = "R8_Zns7pcZVRdnsTnxfINhEkgVGqZpC3jn1fuyh8";
        const PROXY = "https://cors-anywhere.herokuapp.com/"; // Túnel de seguridad
        const API_URL = "https://api.replicate.com/v1/predictions";
        const DEMO_IMG = "https://replicate.delivery/pbxt/JRw7O8rWkI9kH2xPz5Yn9L1yF5t0H9rD7e5X3g1v1B1b1B1/output.png";

        const btnGen = document.getElementById('generate-btn');
        const statusBox = document.getElementById('status-box');
        const statusMsg = document.getElementById('status-msg');
        const resultBox = document.getElementById('result-box');

        document.getElementById('btn-demo').onclick = () => { document.getElementById('logo-url').value = DEMO_IMG; };

        btnGen.onclick = async () => {
            const logo = document.getElementById('logo-url').value.trim();
            if(!logo) return alert("Pega una URL de logo primero.");

            btnGen.disabled = true;
            btnGen.style.opacity = "0.5";
            statusBox.classList.remove('hidden');
            resultBox.classList.add('hidden');

            try {
                // Paso 1: Pedir el video a la IA
                const response = await fetch(PROXY + API_URL, {
                    method: "POST",
                    headers: {
                        "Authorization": `Token ${REPLICATE_TOKEN}`,
                        "Content-Type": "application/json",
                        "X-Requested-With": "XMLHttpRequest"
                    },
                    body: JSON.stringify({
                        version: "luma/dream-machine",
                        input: { prompt: document.getElementById('style-select').value, image: logo }
                    })
                });

                const data = await response.json();
                if(data.detail) throw new Error(data.detail);

                // Paso 2: Revisar cada 5 seg si ya terminó
                const check = setInterval(async () => {
                    const res = await fetch(PROXY + API_URL + "/" + data.id, {
                        headers: { "Authorization": `Token ${REPLICATE_TOKEN}`, "X-Requested-With": "XMLHttpRequest" }
                    });
                    const statusData = await res.json();
                    
                    statusMsg.innerText = "IA en proceso: " + statusData.status.toUpperCase();

                    if (statusData.status === "succeeded") {
                        clearInterval(check);
                        statusBox.classList.add('hidden');
                        resultBox.classList.remove('hidden');
                        document.getElementById('video-player').src = statusData.output;
                        document.getElementById('download-btn').href = statusData.output;
                        btnGen.disabled = false;
                        btnGen.style.opacity = "1";
                    }
                }, 5000);

            } catch (err) {
                alert("Activa el túnel aquí primero: https://cors-anywhere.herokuapp.com/corsdemo");
                btnGen.disabled = false;
                btnGen.style.opacity = "1";
            }
        };
    </script>
</body>
</html>
