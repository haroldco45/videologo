<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Viral AI | By Harold</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #a855f7;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen flex flex-col items-center justify-center p-6">

    <header class="text-center mb-10">
        <h1 class="text-4xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-600">
            Logo Viral AI
        </h1>
        <p class="text-gray-400 mt-2">Pruebas reales de IA para tu negocio</p>
    </header>

    <main class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-700">
        
        <div id="drop-area" class="border-2 border-dashed border-gray-600 rounded-xl p-10 text-center hover:border-purple-500 transition-colors cursor-pointer">
            <input type="file" id="logo-input" class="hidden" accept="image/*">
            <i class="fas fa-magic text-4xl text-purple-500 mb-4"></i>
            <p id="file-name" class="text-sm text-gray-300">Sube tu logo (PNG/JPG)</p>
        </div>

        <div class="mt-6 space-y-4">
            <label class="block text-sm font-medium text-gray-400">Selecciona el Estilo Viral:</label>
            <select id="style-select" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-purple-500">
                <option value="Cinematic 3D reveal with golden sparkles and epic lighting">Cinematográfico Dorado</option>
                <option value="Cyberpunk neon glow, liquid metal transitions, high energy">Neon Cyberpunk</option>
                <option value="Soft organic movement, natural sunlight, fresh atmosphere">Fresco y Natural (Arroz/Alimentos)</option>
                <option value="Explosion of vibrant colors, energetic motion, 4k">Explosión de Color</option>
            </select>
        </div>

        <button id="generate-btn" class="w-full mt-8 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-bold py-3 rounded-xl transition-all shadow-lg flex items-center justify-center gap-3">
            <span>CREAR VIDEO REAL</span>
        </button>

        <div id="status-container" class="hidden mt-6 p-4 bg-gray-700 rounded-lg border border-purple-500/30">
            <div class="flex items-center gap-3">
                <div class="loading-spinner"></div>
                <p id="status-text" class="text-sm text-purple-300 italic text-center">Iniciando motor de IA...</p>
            </div>
        </div>

        <div id="result-container" class="hidden mt-8">
            <video id="output-video" controls class="w-full rounded-lg border-2 border-purple-500 shadow-lg"></video>
            <a id="download-link" href="#" target="_blank" class="block text-center mt-4 text-purple-400 font-bold hover:underline">📥 Descargar Resultado</a>
        </div>
    </main>

    <footer class="mt-12 text-gray-500 text-xs text-center leading-relaxed">
        Desarrollado para Harold - Distrileco 2026<br>
        <span class="text-purple-400 underline">Vibras Positivas Activadas ✨</span>
    </footer>

    <script>
        const REPLICATE_TOKEN = "R8_Zns7pcZVRdnsTnxfINhEkgVGqZpC3jn1fuyh8";
        
        const dropArea = document.getElementById('drop-area');
        const fileInput = document.getElementById('logo-input');
        const generateBtn = document.getElementById('generate-btn');
        const statusContainer = document.getElementById('status-container');
        const statusText = document.getElementById('status-text');
        const resultContainer = document.getElementById('result-container');
        const outputVideo = document.getElementById('output-video');

        dropArea.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            if(e.target.files.length > 0) {
                document.getElementById('file-name').innerText = `Logo listo: ${e.target.files[0].name}`;
            }
        };

        generateBtn.onclick = async () => {
            const file = fileInput.files[0];
            if (!file) return alert("Por favor, selecciona primero el logo de tu negocio.");

            const style = document.getElementById('style-select').value;
            
            // UI Update
            generateBtn.disabled = true;
            generateBtn.classList.add('opacity-50');
            statusContainer.classList.remove('hidden');
            resultContainer.classList.add('hidden');
            
            try {
                // Paso 1: Enviar a la IA (Usando el modelo Luma Dream Machine)
                // Nota: En una versión real, la imagen se debe subir primero a un hosting para tener una URL.
                // Para esta prueba, simulamos el envío del prompt con el estilo seleccionado.
                
                statusText.innerText = "Conectando con Replicate...";
                
                const response = await fetch("https://api.replicate.com/v1/predictions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Token ${REPLICATE_TOKEN}`,
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        version: "luma/dream-machine",
                        input: {
                            prompt: `${style}, high quality, social media trend, vibrant colors`,
                            // Para pruebas directas de cliente, la IA requiere una URL pública de imagen.
                        }
                    })
                });

                const data = await response.json();
                
                if (data.detail) throw new Error(data.detail);

                // Paso 2: Chequear estado (Polling)
                const predictionId = data.id;
                checkStatus(predictionId);

            } catch (error) {
                console.error(error);
                alert("Error: " + error.message);
                resetUI();
            }
        };

            const interval = setInterval(async () => {

                    headers: { "Authorization": `Token ${REPLICATE_TOKEN}` }
                });
                const data = await response.json();
                
                statusText.innerText = `Estado: ${data.status}... (${new Date().toLocaleTimeString()})`;

                if (data.status === "succeeded") {
                    clearInterval(interval
