<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Viral AI | Vibras Positivas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .loader {
            border: 3px solid rgba(168, 85, 247, 0.2);
            border-top: 3px solid #a855f7;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .btn-gradient {
            background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
            transition: all 0.3s ease;
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(168, 85, 247, 0.5);
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col items-center justify-center p-4">

    <header class="text-center mb-8">
        <div class="inline-block p-2 px-4 rounded-full bg-purple-500/10 border border-purple-500/20 mb-4">
            <span class="text-purple-400 text-xs font-bold tracking-widest uppercase">Inteligencia Artificial Real</span>
        </div>
        <h1 class="text-5xl font-extrabold tracking-tight text-white mb-2">
            Logo Viral <span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">AI</span>
        </h1>
        <p class="text-slate-400">Transforma tu marca con la energía de Vibras Positivas</p>
    </header>

    <main class="glass-card p-8 rounded-3xl w-full max-w-lg shadow-2xl">
        
        <div class="space-y-4 mb-6">
            <label class="block text-sm font-medium text-slate-300">1. URL del Logo (Pública)</label>
            <div class="relative">
                <input type="text" id="logo-url" 
                    placeholder="https://tusitio.com/logo.png" 
                    class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl px-5 py-4 outline-none focus:ring-2 focus:ring-purple-500 transition-all text-sm">
                <button id="btn-demo" class="absolute right-3 top-3 text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded-lg transition-colors">
                    Demo
                </button>
            </div>
        </div>

        <div class="space-y-4 mb-8">
            <label class="block text-sm font-medium text-slate-300">2. Elige el efecto visual</label>
            <select id="style-select" class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl px-5 py-4 outline-none focus:ring-2 focus:ring-purple-500 transition-all text-sm appearance-none cursor-pointer">
                <option value="Cinematic 3D gold reveal, luxury lighting, 4k, particles">Revelación 3D Oro (Premium)</option>
                <option value="Futuristic neon glitch, cyber motion, high energy, vibrant">Energía Neon (Cyberpunk)</option>
                <option value="Soft natural light, organic transitions, clean and fresh">Fresco y Natural (Optimista)</option>
                <option value="Epic fire and smoke reveal, cinematic action, 4k">Explosión Épica</option>
            </select>
        </div>

        <button id="generate-btn" class="btn-gradient w-full py-5 rounded-2xl text-white font-bold text-lg flex items-center justify-center gap-3">
            <i class="fas fa-bolt"></i>
            <span>CREAR VIDEO AHORA</span>
        </button>

        <div id="status-box" class="hidden mt-8 p-6 bg-slate-900/80 rounded-2xl border border-purple-500/20">
            <div class="flex items-start gap-4">
                <div class="loader mt-1"></div>
                <div class="flex-grow">
                    <p id="status-msg" class="text-sm font-semibold text-purple-300 italic">Conectando con el motor de IA...</p>
                    <div class="w-full bg-slate-800 h-1.5 rounded-full mt-3 overflow-hidden">
                        <div id="progress-bar" class="bg-purple-500 h-full w-0 transition-all duration-500"></div>
                    </div>
                    <p id="timer" class="text-[10px] text-slate-500 mt-2 uppercase tracking-widest font-bold">Tiempo estimado: 60-90 segundos</p>
                </div>
            </div>
        </div>

        <div id="result-box" class="hidden mt-8 animate-fadeIn">
            <div class="relative group">
                <video id="video-player" controls class="w-full rounded-2xl border-2 border-purple-500/
